name: Publicar Cálculo Numérico

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout do repositório
        uses: actions/checkout@v4

      - name: ⚙️ Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências Python
        run: pip install numpy scipy matplotlib

      - name: Instalar R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4.0"

      - name: Instalar dependências R (knitr + reticulate)
        run: |
          install.packages(c('knitr', 'rmarkdown', 'reticulate'), repos = 'https://cran.r-project.org')
        shell: Rscript {0}

      - name: 💻 Renderizar o Quarto
        run: quarto render
        env:
          RETICULATE_PYTHON: ${{ env.pythonLocation }}/bin/python

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: ⬆️ Upload do artefato
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: 🚀 Deploy no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
